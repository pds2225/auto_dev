<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Dev Loop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 32px; color: #58a6ff; }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 700px;
      margin-bottom: 20px;
    }

    /* 경로 입력 */
    .path-row { display: flex; gap: 10px; }
    .path-row input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      padding: 10px 14px;
      font-size: 0.9rem;
    }
    .path-row input:focus { outline: none; border-color: #58a6ff; }

    /* ON/OFF 버튼 */
    .toggle-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; margin: 8px 0; }
    #toggleBtn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: none;
      font-size: 1.4rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.25s, box-shadow 0.25s, transform 0.1s;
      outline: none;
    }
    #toggleBtn.off {
      background: #21262d;
      color: #8b949e;
      box-shadow: 0 0 0 4px #30363d;
    }
    #toggleBtn.on {
      background: #1a7f37;
      color: #fff;
      box-shadow: 0 0 30px #2ea04380, 0 0 0 4px #2ea043;
    }
    #toggleBtn:active { transform: scale(0.96); }

    /* 상태 뱃지 */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .badge.idle    { background: #21262d; color: #8b949e; }
    .badge.hardening { background: #1c2d4a; color: #58a6ff; }
    .badge.testing { background: #2d1f55; color: #bc8cff; }
    .badge.debug   { background: #3d1f1f; color: #ff7b72; }
    .badge.done    { background: #1a2d1a; color: #3fb950; }
    .badge.error   { background: #4a1c1c; color: #ff7b72; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .dot.pulse { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* 태스크 */
    .task-label { font-size: 0.75rem; color: #8b949e; margin-bottom: 4px; }
    .task-text { font-size: 0.95rem; color: #e6edf3; min-height: 1.4em; }
    .task-meta { margin-top: 10px; font-size: 0.78rem; color: #8b949e; line-height: 1.5; }
    .task-note { margin-top: 12px; font-size: 0.75rem; color: #7d8590; }

    /* 로그 */
    #logBox {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 14px;
      height: 300px;
      overflow-y: auto;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      color: #7d8590;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #logBox .log-line { color: #e6edf3; }
    #logBox .log-line.warn { color: #d29922; }
    #logBox .log-line.ok { color: #3fb950; }
    #logBox .log-line.err { color: #ff7b72; }

    .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; margin-bottom: 10px; }

    /* 구분선 */
    hr { border: none; border-top: 1px solid #21262d; margin: 20px 0; }

    /* 스캐폴드 폼 */
    .sf-input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-family: inherit;
    }
    .sf-input:focus { outline: none; border-color: #58a6ff; }
    .sf-input:disabled { opacity: 0.35; }
    .sf-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .sf-grid3 { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }
    .sf-log {
      display: none;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Cascadia Code','Consolas',monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      color: #8b949e;
      max-height: 160px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .btn-primary {
      flex: 1; padding: 10px;
      background: #1a7f37; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; font-size: 0.9rem; font-weight: 600;
    }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }
    .btn-outline {
      flex: 1; padding: 10px;
      background: transparent; color: #58a6ff;
      border: 1px solid #58a6ff; border-radius: 8px;
      cursor: pointer; font-size: 0.9rem; font-weight: 600;
      display: none;
    }
  </style>
</head>
<body>
  <h1>⚙ Auto Dev Loop</h1>

  <!-- 스캐폴드 생성 -->
  <div class="card">
    <div class="section-title">스캐폴드 생성 <span id="sfStatus" style="color:#58a6ff;font-size:0.8rem"></span></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <textarea id="sfDesc" class="sf-input" rows="3"
        placeholder="서비스 설명 (예: 월별 지출을 기록하고 카테고리별 분석 차트를 제공하는 가계부 앱)"></textarea>
      <input id="sfPath" class="sf-input" type="text"
        placeholder="생성 경로 (예: D:\my-new-project)" />
      <div class="sf-grid2">
        <input id="sfName" class="sf-input" type="text" placeholder="서비스명 (비우면 설명으로 자동 결정)" />
        <select id="sfStack" class="sf-input">
          <option value="Streamlit">Streamlit</option>
          <option value="FastAPI">FastAPI</option>
          <option value="Next.js">Next.js</option>
          <option value="Python CLI">Python CLI</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="sf-grid3">
        <select id="sfProvider" class="sf-input" onchange="toggleSfApiKey()">
          <option value="template">템플릿 (API 없이)</option>
          <option value="claude">Claude API</option>
          <option value="openai">OpenAI API</option>
        </select>
        <input id="sfApiKey" class="sf-input" type="password"
          placeholder="API Key (템플릿 모드는 불필요)" disabled />
      </div>
      <div style="display:flex;gap:10px">
        <button id="sfBtn" class="btn-primary" onclick="startScaffold()">생성 시작</button>
        <button id="sfLoopBtn" class="btn-outline" onclick="scaffoldThenLoop()">루프 시작 →</button>
      </div>
      <div id="sfLog" class="sf-log"></div>
    </div>
  </div>

  <!-- 경로 입력 -->
  <div class="card">
    <div class="section-title">프로젝트 경로</div>
    <div class="path-row">
      <input id="projectDir" type="text" placeholder="예: D:\auto_dev\bizplan-autofill-codex\bizplan-autofill-codex" />
    </div>
  </div>

  <!-- 프로젝트 큐 -->
  <div class="card">
    <div class="section-title">프로젝트 큐 <span id="queueCount" style="color:#58a6ff"></span></div>
    <div class="path-row" style="margin-bottom:10px">
      <input id="queueInput" type="text" placeholder="큐에 추가할 프로젝트 경로" />
      <button onclick="queueAdd()" style="padding:8px 16px;background:#1a7f37;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:0.85rem">추가</button>
    </div>
    <div id="queueList" style="font-size:0.82rem;color:#8b949e;line-height:1.8"></div>
  </div>

  <!-- 메인 토글 -->
  <div class="card">
    <div class="toggle-wrap">
      <button id="toggleBtn" class="off">OFF</button>
      <div id="stageBadge" class="badge idle"><span class="dot"></span> 대기 중</div>
    </div>
    <hr />
    <div class="task-label">현재 태스크</div>
    <div id="taskText" class="task-text">—</div>
    <div id="taskMeta" class="task-meta">ID: — | Type: — | Reason: —</div>
    <div class="task-note">선택 기준: generated TASK-xx 우선, 없으면 Active의 첫 일반 미완료를 fallback 선택.</div>
  </div>

  <!-- 태스크 목록 -->
  <div class="card">
    <div class="section-title">태스크 진행률 <span id="taskProgress" style="color:#58a6ff"></span></div>
    <div id="taskList" style="font-size:0.82rem;line-height:1.8;max-height:200px;overflow-y:auto"></div>
  </div>

  <!-- 로그 -->
  <div class="card">
    <div class="section-title">실시간 로그</div>
    <div id="logBox"></div>
  </div>

  <script>
    const btn = document.getElementById('toggleBtn');
    const badge = document.getElementById('stageBadge');
    const taskText = document.getElementById('taskText');
    const taskMeta = document.getElementById('taskMeta');
    const logBox = document.getElementById('logBox');
    const dirInput = document.getElementById('projectDir');
    const PROJECT_DIR_DRAFT_KEY = 'auto-dev-project-dir-draft';
    let projectDirDirty = false;

    const STAGE_LABELS = {
      idle:      { label: '대기 중',      cls: 'idle',      pulse: false },
      hardening: { label: '🔨 하드닝 중', cls: 'hardening', pulse: true  },
      testing:   { label: '🧪 테스트 중', cls: 'testing',   pulse: true  },
      debug:     { label: '🐛 디버그 중', cls: 'debug',     pulse: true  },
      done:      { label: '✅ 완료',      cls: 'done',      pulse: false },
      error:     { label: '⚠ 오류 중지', cls: 'error',     pulse: false },
    };

    function setStage(stage) {
      const info = STAGE_LABELS[stage] || STAGE_LABELS.idle;
      badge.className = `badge ${info.cls}`;
      badge.innerHTML = `<span class="dot${info.pulse ? ' pulse' : ''}"></span> ${info.label}`;
    }

    function appendLog(line) {
      if (!line.trim()) return;
      const div = document.createElement('div');
      div.className = 'log-line' +
        (line.includes('✅') || line.includes('통과') ? ' ok' : '') +
        (line.includes('⚠') || line.includes('오류') || line.includes('실패') ? ' err' : '') +
        (line.includes('📌') || line.includes('🔨') || line.includes('🧪') || line.includes('🐛') ? ' warn' : '');
      div.textContent = line;
      logBox.appendChild(div);
      logBox.scrollTop = logBox.scrollHeight;
    }

    function setTaskMeta(data) {
      const taskId = data.current_task_id || '—';
      const taskType = data.current_task_type || '—';
      const reason = data.selection_reason || '—';
      taskMeta.textContent = `ID: ${taskId} | Type: ${taskType} | Reason: ${reason}`;
    }

    function saveProjectDirDraft(value) {
      try {
        localStorage.setItem(PROJECT_DIR_DRAFT_KEY, value);
      } catch {}
    }

    function loadProjectDirDraft() {
      try {
        return localStorage.getItem(PROJECT_DIR_DRAFT_KEY) || '';
      } catch {
        return '';
      }
    }

    const initialProjectDirDraft = loadProjectDirDraft();
    if (initialProjectDirDraft) {
      dirInput.value = initialProjectDirDraft;
      projectDirDirty = true;
    }

    dirInput.addEventListener('input', () => {
      projectDirDirty = true;
      saveProjectDirDraft(dirInput.value.trim());
    });

    // 상태 폴링
    async function pollState() {
      try {
        const res = await fetch('/api/loop/state');
        const data = await res.json();
        btn.className = data.running ? 'on' : 'off';
        btn.textContent = data.running ? 'ON' : 'OFF';
        setStage(data.current_stage);
        taskText.textContent = data.current_task || '—';
        setTaskMeta(data);
        if (data.project_dir && !projectDirDirty && document.activeElement !== dirInput) {
          dirInput.value = data.project_dir;
          saveProjectDirDraft(data.project_dir);
        }
      } catch {}
    }

    // SSE 로그 스트리밍
    const evtSource = new EventSource('/api/loop/stream');
    evtSource.onmessage = (e) => { if (e.data) appendLog(e.data); };

    // 토글 클릭
    btn.addEventListener('click', async () => {
      const payload = { project_dir: dirInput.value.trim() };
      try {
        const res = await fetch('/api/loop/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data.error) { appendLog('❌ ' + data.error); return; }
        projectDirDirty = false;
        saveProjectDirDraft(dirInput.value.trim());
        appendLog(data.running ? '▶ 루프 시작됨' : '⏹ 루프 중단됨');
        pollState();
      } catch (e) { appendLog('❌ 서버 연결 오류'); }
    });

    async function pollTasks() {
      try {
        const res = await fetch('/api/tasks');
        const data = await res.json();
        if (data.total === 0) { taskList.innerHTML = '<span style="color:#8b949e">TASKS.md 없음</span>'; return; }
        taskProgress.textContent = `${data.done.length} / ${data.total} 완료`;
        const currentTask = document.getElementById('taskText').textContent;
        taskList.innerHTML = [
          ...data.done.map(t => `<div style="color:#3fb950;text-decoration:line-through">✓ ${t}</div>`),
          ...data.pending.map(t => {
            const isActive = currentTask && t.includes(currentTask.replace(/^\[.*?\]\s*/, '').trim().slice(0, 20));
            return `<div style="color:${isActive ? '#f0b429' : '#e6edf3'}${isActive ? ';font-weight:700' : ''}">· ${t}</div>`;
          })
        ].join('');
      } catch {}
    }

    async function pollQueue() {
      try {
        const res = await fetch('/api/queue');
        const data = await res.json();
        const q = data.queue || [];
        queueCount.textContent = q.length ? `(${q.length}개 대기)` : '';
        queueList.innerHTML = q.length
          ? q.map((p, i) => `<div>${i + 1}. ${p} <span onclick="queueRemove('${p}')" style="cursor:pointer;color:#ff7b72;margin-left:8px">✕</span></div>`).join('')
          : '<span>대기 중인 프로젝트 없음</span>';
      } catch {}
    }

    async function queueAdd() {
      const val = document.getElementById('queueInput').value.trim();
      if (!val) return;
      await fetch('/api/queue', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ project_dir: val }) });
      document.getElementById('queueInput').value = '';
      pollQueue();
    }

    async function queueRemove(dir) {
      await fetch('/api/queue', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ project_dir: dir }) });
      pollQueue();
    }

    setInterval(pollState, 1500);
    setInterval(pollTasks, 3000);
    setInterval(pollQueue, 3000);
    pollState();
    pollTasks();
    pollQueue();

    // ── 스캐폴드 ──────────────────────────────────────────
    let _sfPollTimer = null;
    let _sfLastResult = null;

    function toggleSfApiKey() {
      const prov = document.getElementById('sfProvider').value;
      const key = document.getElementById('sfApiKey');
      key.disabled = (prov === 'template');
    }

    function _sfLog(line, cls) {
      const box = document.getElementById('sfLog');
      box.style.display = 'block';
      const d = document.createElement('div');
      d.style.color = cls === 'ok' ? '#3fb950' : cls === 'err' ? '#ff7b72' : '#8b949e';
      d.textContent = line;
      box.appendChild(d);
      box.scrollTop = box.scrollHeight;
    }

    async function startScaffold() {
      const desc = document.getElementById('sfDesc').value.trim();
      const path = document.getElementById('sfPath').value.trim();
      if (!desc) { _sfLog('서비스 설명을 입력하세요.', 'err'); return; }
      if (!path) { _sfLog('생성 경로를 입력하세요.', 'err'); return; }

      document.getElementById('sfLog').innerHTML = '';
      document.getElementById('sfLog').style.display = 'block';
      document.getElementById('sfBtn').disabled = true;
      document.getElementById('sfLoopBtn').style.display = 'none';
      document.getElementById('sfStatus').textContent = '⏳ 생성 중...';
      _sfLastResult = null;

      const body = {
        description: desc,
        folder_path: path,
        service_name: document.getElementById('sfName').value.trim(),
        tech_stack: document.getElementById('sfStack').value,
        provider: document.getElementById('sfProvider').value,
        api_key: document.getElementById('sfApiKey').value.trim(),
      };

      try {
        const res = await fetch('/api/scaffold', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.error) { _sfLog('❌ ' + data.error, 'err'); document.getElementById('sfBtn').disabled = false; return; }
        _sfPollTimer = setInterval(_pollScaffold, 800);
      } catch (e) {
        _sfLog('❌ 서버 연결 오류', 'err');
        document.getElementById('sfBtn').disabled = false;
      }
    }

    async function _pollScaffold() {
      try {
        const res = await fetch('/api/scaffold/status');
        const data = await res.json();

        if (data.log && data.log.length) {
          const box = document.getElementById('sfLog');
          const rendered = box.children.length;
          for (let i = rendered; i < data.log.length; i++) {
            const l = data.log[i];
            _sfLog(l, l.includes('[OK]') || l.includes('완료') ? 'ok' : l.includes('ERROR') || l.includes('실패') ? 'err' : '');
          }
        }

        if (!data.running) {
          clearInterval(_sfPollTimer);
          document.getElementById('sfBtn').disabled = false;
          const result = data.result;
          _sfLastResult = result;
          if (result && result.ok) {
            document.getElementById('sfStatus').textContent = '✅ 완료';
            _sfLog(`✅ ${result.service_name} — ${result.base_dir}`, 'ok');
            document.getElementById('sfLoopBtn').style.display = 'flex';
            document.getElementById('projectDir').value = result.base_dir;
            saveProjectDirDraft(result.base_dir);
          } else {
            document.getElementById('sfStatus').textContent = '❌ 실패';
            _sfLog('❌ ' + (result && result.error ? result.error : '알 수 없는 오류'), 'err');
          }
        }
      } catch {}
    }

    function scaffoldThenLoop() {
      if (!_sfLastResult || !_sfLastResult.ok) return;
      const payload = { project_dir: _sfLastResult.base_dir };
      fetch('/api/loop/toggle', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      }).then(r => r.json()).then(data => {
        if (data.error) { appendLog('❌ ' + data.error); return; }
        document.getElementById('projectDir').value = _sfLastResult.base_dir;
        saveProjectDirDraft(_sfLastResult.base_dir);
        appendLog('▶ 루프 시작됨 — ' + _sfLastResult.base_dir);
        pollState();
      }).catch(() => appendLog('❌ 서버 연결 오류'));
    }
  </script>
</body>
</html>
