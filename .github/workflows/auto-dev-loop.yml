name: Auto Dev Loop

on:
  workflow_dispatch:
    inputs:
      goal:
        description: '개발 목표 (예: 로그인 버튼 디자인 개선)'
        required: true
        type: string
      mode:
        description: '실행 모드'
        required: false
        default: 'standard'
        type: choice
        options:
          - standard
          - night
          - quick

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  auto-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run auto-dev (one-shot)
        env:
          GOAL: ${{ github.event.inputs.goal }}
          MODE: ${{ github.event.inputs.mode }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/run_auto_dev_once.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No file changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "File changes detected:"
            git diff --name-only
            git diff --staged --name-only
          fi

      - name: Create branch and commit
        if: steps.changes.outputs.changed == 'true'
        id: create_branch
        run: |
          BRANCH="auto-dev/$(date +%Y%m%d-%H%M%S)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          GOAL_SHORT="${{ github.event.inputs.goal }}"
          git commit -m "auto-dev: ${GOAL_SHORT:0:72}"
          git push -u origin "$BRANCH"

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GOAL_INPUT="${{ github.event.inputs.goal }}"
          MODE_INPUT="${{ github.event.inputs.mode }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "## 자동 생성된 PR"
            echo ""
            echo "**개발 목표:** ${GOAL_INPUT}"
            echo "**실행 모드:** ${MODE_INPUT}"
            echo "**워크플로우 실행:** [Run #${{ github.run_number }}](${RUN_URL})"
            echo ""
            echo "이 PR은 Auto Dev Cloud Mode에서 자동 생성되었습니다."
            echo "변경 내용을 검토한 후 Merge 또는 Close 하세요."
          } > /tmp/pr_body.md
          gh pr create \
            --title "auto-dev: ${GOAL_INPUT}" \
            --body-file /tmp/pr_body.md \
            --base main \
            --head "${{ steps.create_branch.outputs.branch }}"
